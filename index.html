<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#090907">
  <title>MEM Solari Flight Board</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="terminal" aria-label="Memphis International Airport flight board">
    <header class="header">
      <div>
        <p class="eyebrow">CITY OF MEMPHIS · TENNESSEE</p>
        <h1 class="airport-name">MEMPHIS INTERNATIONAL AIRPORT</h1>
        <p class="airport-code">MEM · FLIGHT INFORMATION</p>
      </div>
      <div class="clock-panel" aria-live="off">
        <div class="analog-clock" id="analogClock" role="img" aria-label="Memphis local time">
          <span class="clock-ticks"></span>
          <span class="hour-tick" style="--hour:0"></span><span class="hour-tick" style="--hour:1"></span>
          <span class="hour-tick" style="--hour:2"></span><span class="hour-tick" style="--hour:3"></span>
          <span class="hour-tick" style="--hour:4"></span><span class="hour-tick" style="--hour:5"></span>
          <span class="hour-tick" style="--hour:6"></span><span class="hour-tick" style="--hour:7"></span>
          <span class="hour-tick" style="--hour:8"></span><span class="hour-tick" style="--hour:9"></span>
          <span class="hour-tick" style="--hour:10"></span><span class="hour-tick" style="--hour:11"></span>
          <span class="clock-brand">MEM</span>
          <span class="clock-mark mark-12">12</span>
          <span class="clock-mark mark-3">3</span>
          <span class="clock-mark mark-6">6</span>
          <span class="clock-mark mark-9">9</span>
          <span class="clock-hand hour-hand" id="hourHand"></span>
          <span class="clock-hand minute-hand" id="minuteHand"></span>
          <span class="clock-hand second-hand" id="secondHand"></span>
          <span class="clock-pin"></span>
        </div>
        <div class="clock-caption">
          <div>MEMPHIS LOCAL TIME</div>
          <div id="date">LOADING DATE</div>
        </div>
      </div>
    </header>

    <section class="controls" aria-label="Board controls">
      <div class="button-group" role="group" aria-label="Flight direction">
        <button id="departuresButton" class="active" type="button" aria-pressed="true">DEPARTURES</button>
        <button id="arrivalsButton" type="button" aria-pressed="false">ARRIVALS</button>
      </div>
      <div class="board-title" id="boardTitle" aria-live="polite"></div>
      <div class="button-group" role="group" aria-label="Display options">
        <button id="cycleButton" type="button" aria-pressed="false">AUTO CYCLE: OFF</button>
        <button id="soundButton" type="button" aria-pressed="false">SOUND: OFF</button>
        <button id="fullscreenButton" type="button">FULL SCREEN</button>
      </div>
    </section>

    <section class="board-scroll" aria-label="Flights">
      <table>
        <thead>
          <tr>
            <th>FLIGHT</th><th>CARRIER</th><th>TIME</th>
            <th id="cityHeading">DESTINATION</th><th>INFORMATION</th>
          </tr>
        </thead>
        <tbody id="flightRows"></tbody>
      </table>
    </section>

    <footer class="footer">
      <span>SAMPLE FLIGHT DISPLAY</span>
      <span>VERIFY INFORMATION WITH MEM OR YOUR AIRLINE</span>
      <span>SHORTCUTS: ← → BOARD · A AUTO · S SOUND · F FULL SCREEN</span>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
