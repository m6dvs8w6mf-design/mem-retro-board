<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>MEM Solari Flight Board</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main class="terminal">

    <header class="header">
      <div>
        <h1 class="airport-name">
          MEMPHIS INTERNATIONAL AIRPORT
        </h1>

        <div class="airport-code">
          MEM · TENNESSEE
        </div>
      </div>

      <div class="clock">
        <div id="time"></div>
        <div id="date"></div>
      </div>
    </header>

    <section class="controls">

      <div class="button-group">
        <button id="departuresButton" class="active">
          DEPARTURES
        </button>

        <button id="arrivalsButton">
          ARRIVALS
        </button>
      </div>

      <div class="button-group">
        <button id="cycleButton">
          AUTO CYCLE: OFF
        </button>

        <button id="fullscreenButton">
          FULL SCREEN
        </button>
      </div>

      <div class="mode-label">
        SAMPLE DISPLAY · SOLARI MODE
      </div>

    </section>

    <section class="board-scroll">
      <table>
        <thead>
          <tr>
            <th>TIME</th>
            <th>FLIGHT</th>
            <th>AIRLINE</th>
            <th id="cityHeading">DESTINATION</th>
            <th>GATE</th>
            <th>STATUS</th>
          </tr>
        </thead>

        <tbody id="flightRows"></tbody>
      </table>
    </section>

    <footer class="footer">
      DECORATIVE DISPLAY · VERIFY FLIGHT INFORMATION WITH MEM OR THE AIRLINE
    </footer>

  </main>

  <script src="script.js"></script>
</body>
</html>
