name: Update MEM flight board

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Fetch official MEM flight data
        run: node update-flights.mjs
      - name: Publish refreshed flight data
        run: |
          if git diff --quiet flights.json; then exit 0; fi
          git config user.name "MEM Board Updater"
          git config user.email "actions@users.noreply.github.com"
          git add flights.json
          git commit -m "Refresh MEM flight data"
          git push
